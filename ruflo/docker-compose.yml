# RuFlo Chat UI (ruvocal fork) + MCP Bridge
# All secrets via environment variables. Never commit .env files with keys.
#
# Usage:
#   cp .env.example .env   # fill in your API keys
#   docker compose up -d

services:
  # --- MongoDB ---
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DB_NAME:-chat-db}

  # --- MCP Bridge (ruvocal version — Gemini grounded search, autopilot SSE) ---
  mcp-bridge:
    build:
      context: ./src/ruvocal/mcp-bridge
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      NODE_ENV: production
      # AI Provider Keys (required: at least one)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # Backend service URLs (add your own)
      SEARCH_API_URL: ${SEARCH_API_URL:-}
      RESEARCH_API_URL: ${RESEARCH_API_URL:-}
      # --- Tool Groups (MCP_GROUP_*) ---
      # Default-on groups
      MCP_GROUP_INTELLIGENCE: ${MCP_GROUP_INTELLIGENCE:-true}
      MCP_GROUP_AGENTS: ${MCP_GROUP_AGENTS:-true}
      MCP_GROUP_MEMORY: ${MCP_GROUP_MEMORY:-true}
      MCP_GROUP_DEVTOOLS: ${MCP_GROUP_DEVTOOLS:-true}
      # Opt-in groups
      MCP_GROUP_SECURITY: ${MCP_GROUP_SECURITY:-false}
      MCP_GROUP_BROWSER: ${MCP_GROUP_BROWSER:-false}
      MCP_GROUP_NEURAL: ${MCP_GROUP_NEURAL:-false}
      MCP_GROUP_AGENTIC_FLOW: ${MCP_GROUP_AGENTIC_FLOW:-false}
      MCP_GROUP_CLAUDE_CODE: ${MCP_GROUP_CLAUDE_CODE:-false}
      MCP_GROUP_GEMINI: ${MCP_GROUP_GEMINI:-false}
      MCP_GROUP_CODEX: ${MCP_GROUP_CODEX:-false}
      # API keys for optional groups
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Nginx reverse proxy (brand injection, CORS, static assets) ---
  nginx:
    build:
      context: ./src/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - chat-ui
      - mcp-bridge
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- RuFlo Chat UI (ruvocal SvelteKit fork — built from source) ---
  chat-ui:
    build:
      context: ./src/ruvocal
      dockerfile: Dockerfile
      args:
        INCLUDE_DB: "false"
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      # Runtime config injected via DOTENV_LOCAL (entrypoint.sh writes .env.local)
      DOTENV_LOCAL: |
        MONGODB_URL=mongodb://mongodb:27017
        MONGODB_DB_NAME=${MONGODB_DB_NAME:-chat-db}
        PUBLIC_APP_NAME=${BRAND_NAME:-RuFlo}
        PUBLIC_APP_DESCRIPTION=${BRAND_DESCRIPTION:-Enterprise AI Agent Orchestration Platform}
        PUBLIC_APP_ASSETS=chatui
        PUBLIC_ORIGIN=
        LLM_SUMMARIZATION=true
        ENABLE_DATA_EXPORT=true
        ALLOW_IFRAME=true
        OPENAI_BASE_URL=https://openrouter.ai/api/v1
        OPENAI_API_KEY=${OPENROUTER_API_KEY:-sk-placeholder}
        MODELS=[{"id":"anthropic/claude-sonnet-4.5","displayName":"Claude Sonnet 4.5","description":"Anthropic latest fast and capable model."},{"id":"anthropic/claude-sonnet-4","displayName":"Claude Sonnet 4","description":"Advanced reasoning and coding from Anthropic."},{"id":"anthropic/claude-opus-4.7","displayName":"Claude Opus 4.7","description":"Most powerful Claude model for complex tasks."},{"id":"anthropic/claude-3.5-haiku","displayName":"Claude 3.5 Haiku","description":"Fast lightweight Claude model."},{"id":"google/gemini-2.5-pro-preview","displayName":"Gemini 2.5 Pro","description":"Google most capable model with deep thinking."},{"id":"google/gemini-2.5-flash","displayName":"Gemini 2.5 Flash","description":"Fast and efficient Gemini model."},{"id":"openai/gpt-4.1","displayName":"GPT-4.1","description":"OpenAI latest GPT with improved reasoning."},{"id":"openai/gpt-4o","displayName":"GPT-4o","description":"OpenAI multimodal flagship model."},{"id":"openai/gpt-4o-mini","displayName":"GPT-4o Mini","description":"Fast and affordable OpenAI model."},{"id":"openai/o3-mini","displayName":"o3-mini","description":"OpenAI reasoning model for STEM."},{"id":"meta-llama/llama-4-maverick","displayName":"Llama 4 Maverick","description":"Meta latest open model with strong performance."},{"id":"deepseek/deepseek-r1","displayName":"DeepSeek R1","description":"Advanced reasoning with chain-of-thought."}]
        TASK_MODEL=anthropic/claude-3.5-haiku
        MCP_SERVERS=[{"name":"Core Tools","url":"http://mcp-bridge:3001/mcp/core"},{"name":"Intelligence & Learning","url":"http://mcp-bridge:3001/mcp/intelligence"},{"name":"Agents & Orchestration","url":"http://mcp-bridge:3001/mcp/agents"},{"name":"Memory & Knowledge","url":"http://mcp-bridge:3001/mcp/memory"},{"name":"Dev Tools & Analysis","url":"http://mcp-bridge:3001/mcp/devtools"}]
        COOKIE_SECURE=${COOKIE_SECURE:-false}
        COOKIE_SAMESITE=${COOKIE_SAMESITE:-lax}
    depends_on:
      - mongodb
      - mcp-bridge

volumes:
  mongo-data:
