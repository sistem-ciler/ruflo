tunnel: <TUNNEL_ID>
credentials-file: /etc/cloudflared/credentials.json

ingress:
  - hostname: api.getopscore.com
    service: http://localhost:3001
    originRequest:
      noTLSVerify: false
      connectTimeout: 10s
  - hostname: agents.getopscore.com
    service: http://localhost:4000
    originRequest:
      noTLSVerify: false
      connectTimeout: 10s
  - hostname: getopscore.com
    service: http://localhost:3000
    originRequest:
      noTLSVerify: false
      connectTimeout: 30s
  - service: http_status:404
